<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Nudge Warm Retro Gradient -->
    <linearGradient id="nudge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB020" />
      <stop offset="35%" stop-color="#F97316" />
      <stop offset="70%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#E8321A" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141416" />
      <stop offset="100%" stop-color="#070708" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Subtle Outer Border -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#27272A" stroke-width="8" />
  
  <!-- Outer Dotted Accent Ring -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="#3F3F46" stroke-width="6" stroke-dasharray="16 12" opacity="0.6" />
  
  <!-- Retro Brand Stripes at Bottom -->
  <g opacity="0.95">
    <rect x="64" y="384" width="384" height="10" rx="5" fill="#FFB020" />
    <rect x="64" y="398" width="384" height="10" rx="5" fill="#F97316" />
    <rect x="64" y="412" width="384" height="10" rx="5" fill="#EF4444" />
    <rect x="64" y="426" width="384" height="10" rx="5" fill="#E8321A" />
  </g>

  <!-- Nudge P2P Transfer Arrow (pointing top-right) -->
  <path d="M160 320 L344 320 L344 136" fill="none" stroke="url(#nudge-grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M160 320 L344 136" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" />

  <!-- Signature Nudge Red Dot -->
  <circle cx="344" cy="136" r="28" fill="#E8321A" stroke="#FFFFFF" stroke-width="6" />
</svg>
