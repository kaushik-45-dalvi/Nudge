<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Warm retro linear gradient for the arrow -->
    <linearGradient id="retro-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB020" />
      <stop offset="33%" stop-color="#F97316" />
      <stop offset="66%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>
  </defs>
  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="#0C0C0E" />
  
  <!-- Outer Dotted Ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#3F3F46" stroke-width="6" stroke-dasharray="16 12" />
  
  <!-- Horizontal Stripes at bottom -->
  <g opacity="0.85">
    <rect x="64" y="380" width="384" height="12" fill="#FFB020" />
    <rect x="64" y="392" width="384" height="12" fill="#F97316" />
    <rect x="64" y="404" width="384" height="12" fill="#EF4444" />
    <rect x="64" y="416" width="384" height="12" fill="#991B1B" />
  </g>

  <!-- Nudge Minimal Arrow (pointing top right/forward) -->
  <path d="M160 320 L352 320 L352 128" fill="none" stroke="url(#retro-grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M160 320 L352 128" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" />
</svg>
